name: Refresh scientific datasets

on:
  workflow_dispatch:
    inputs:
      repair_all_optical_spectra:
        description: 'Intentar reparar todos los espectros ópticos NIST vacíos (puede generar muchos datos)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'scripts/enrich_advanced_properties.py'
      - 'scripts/enrich_science_phase_2.py'
      - 'scripts/enrich_science_phase_2_v2.py'
      - 'scripts/repair_iron_spectrum.py'
      - '.github/workflows/refresh-scientific-data.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: scientific-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Download, validate and persist element data
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MP_API_KEY: ${{ secrets.MP_API_KEY }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          check-latest: true

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Enrich electronic, crystal, thermodynamic and radiation data
        run: npm run enrich:all

      - name: Repair the iron optical spectrum
        run: npm run repair:iron-spectrum

      - name: Optionally repair every empty optical spectrum
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.repair_all_optical_spectra }}
        run: npm run repair:spectra:all

      - name: Regenerate local datasets
        run: npm run build:data

      - name: Validate Svelte and TypeScript
        run: npm run check

      - name: Validate production build
        run: npm run build

      - name: Commit per-element CSV changes
        id: persist
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/elements
          if git diff --cached --quiet; then
            echo 'No scientific CSV changes to commit.'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m 'data: refresh scientific datasets by element'
          git push
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Publish the refreshed scientific data
        if: ${{ steps.persist.outputs.changed == 'true' }}
        run: gh workflow run deploy-pages.yml --ref main
